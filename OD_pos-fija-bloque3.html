<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronombres de objeto directo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 640px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 2rem;
      color: #1a1a18;
    }

    .progress-bar {
      height: 4px;
      background: #d3d1c7;
      border-radius: 2px;
      margin-bottom: 2rem;
    }

    .progress-fill {
      height: 100%;
      background: #185fa5;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .counter {
      font-size: 13px;
      color: #5f5e5a;
      text-align: right;
      margin-bottom: 6px;
    }

    .label {
      font-size: 12px;
      color: #5f5e5a;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .antecedente {
      font-size: 18px;
      color: #1a1a18;
      background: #eeeee9;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .antecedente strong {
      color: #185fa5;
    }

    .section-title {
      font-size: 14px;
      color: #5f5e5a;
      margin-bottom: 10px;
    }

    .word-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 48px;
      margin-bottom: 1.5rem;
    }

    .word-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 0.5px solid #888780;
      background: #fff;
      color: #1a1a18;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .word-btn:hover {
      background: #eeeee9;
    }

    .word-btn.used {
      opacity: 0.3;
      pointer-events: none;
    }

    .sentence-area {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1rem;
      min-height: 52px;
      border-radius: 12px;
      border: 0.5px solid #888780;
      padding: 10px 14px;
      background: #fff;
    }

    .placed-word {
      padding: 4px 10px;
      border-radius: 8px;
      background: #e6f1fb;
      color: #185fa5;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.15s;
      border: none;
      font-family: inherit;
    }

    .placed-word:hover {
      opacity: 0.7;
    }

    .verb-placeholder {
      font-size: 15px;
      color: #888780;
      padding: 4px 10px;
      border-radius: 8px;
      border: 0.5px dashed #888780;
    }

    .section-title-pronoun {
      font-size: 14px;
      color: #5f5e5a;
      margin-bottom: 10px;
    }

    .pronoun-area {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      row-gap: 8px;
    }

    .verb-base {
      font-size: 17px;
      color: #1a1a18;
    }

    .pronoun-input {
      font-size: 16px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 0.5px solid #888780;
      background: #fff;
      color: #1a1a18;
      width: 80px;
      outline: none;
      font-family: inherit;
      margin: 0 4px;
    }

    .pronoun-input:focus {
      border-color: #185fa5;
      box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.15);
    }

    .verb-suffix {
      font-size: 15px;
      color: #5f5e5a;
      margin-left: 2px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 1rem;
    }

    .check-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: 0.5px solid #888780;
      background: #fff;
      color: #1a1a18;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .check-btn:hover { background: #eeeee9; }
    .check-btn:active { transform: scale(0.98); }

    .next-btn {
      display: none;
      padding: 8px 24px;
      border-radius: 8px;
      border: 0.5px solid #185fa5;
      background: #e6f1fb;
      color: #185fa5;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }

    .next-btn:hover { opacity: 0.8; }

    .feedback {
      font-size: 15px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
      line-height: 1.5;
    }

    .feedback.correct {
      background: #eaf3de;
      color: #3b6d11;
      display: block;
    }

    .feedback.incorrect {
      background: #fcebeb;
      color: #a32d2d;
      display: block;
    }

    /* Pantalla final */
    .final-screen {
      text-align: center;
      padding: 3rem 1rem;
      display: none;
    }

    .final-screen h2 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .final-score {
      font-size: 48px;
      font-weight: 500;
      color: #185fa5;
      margin: 1rem 0;
    }

    .final-msg {
      color: #5f5e5a;
      font-size: 15px;
      margin-bottom: 1.5rem;
    }

    .restart-btn {
      padding: 8px 24px;
      border-radius: 8px;
      border: 0.5px solid #888780;
      background: #fff;
      color: #1a1a18;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .restart-btn:hover { background: #eeeee9; }
  </style>
</head>
<body>

<div class="app">
  <h1>Pronombres de objeto directo</h1>

  <div id="main-screen">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="counter" id="counter"></div>

    <div class="label">Contexto</div>
    <div class="antecedente" id="antecedente"></div>

    <div class="section-title">Ordená las palabras de la segunda parte:</div>
    <div class="word-pool" id="word-pool"></div>

    <div class="section-title">Tu oración:</div>
    <div class="sentence-area" id="sentence-area"></div>

    <div class="section-title-pronoun">Ahora escribí el pronombre enclítico:</div>
    <div class="pronoun-area">
      <span class="verb-base" id="verb-base"></span>
      <input class="pronoun-input" id="pronoun-input" placeholder="?" autocomplete="off" autocorrect="off" spellcheck="false" />
      <span class="verb-suffix" id="verb-suffix"></span>
    </div>

    <div class="actions">
      <button class="check-btn" onclick="checkAnswer()">Verificar</button>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Siguiente →</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="final-screen" id="final-screen">
    <h2>¡Ejercicio terminado!</h2>
    <div class="final-score" id="final-score"></div>
    <p class="final-msg" id="final-msg"></p>
    <button class="restart-btn" onclick="restart()">Volver a empezar</button>
  </div>
</div>

<script>
const frases = [
  {
    antecedente: "Hay una película coreana muy buena hoy en el BAFICI.",
    segunda: ["Tengo", "ganas", "de", "ver"],
    verbo: "ver",
    pronombre: "la",
    sufijo: "",
    antecedente_highlight: "película coreana",
    respuesta_completa: "Tengo ganas de verla."
  },
  {
    antecedente: "Las entradas para la ópera son difíciles de conseguir.",
    segunda: ["Es", "necesario", "comprar"],
    verbo: "comprar",
    pronombre: "las",
    sufijo: " con anticipación.",
    antecedente_highlight: "entradas",
    respuesta_completa: "Es necesario comprarlas con bastante anticipación."
  },
  {
    antecedente: "Me gustan los libros usados.",
    segunda: ["Me", "encanta", "buscar"],
    verbo: "buscar",
    pronombre: "los",
    sufijo: " por Av. Corrientes",
    antecedente_highlight: "libros usados",
    respuesta_completa: "Me gusta buscarlos por Av. Corrientes."
  },
  {
    antecedente: "Hay muchas actividades culturales en la Noche de las Librerías.",
    segunda: ["Es", "imposible", "hacer"],
    verbo: "hacer",
    pronombre: "las",
    sufijo: " todas en una noche",
    antecedente_highlight: "actividades culturales",
    respuesta_completa: "Es imposible hacerlas todas en una noche."
  },
  {
    antecedente: "Dejé los documentos del trámite arriba de la mesa.",
    segunda: ["No", "olvides", "de", "llevar"],
    verbo: "llevar",
    pronombre: "los",
    sufijo: "",
    antecedente_highlight: "documentos",
    respuesta_completa: "No olvides de llevarlos."
  },
  {
    antecedente: "En la librería encontré el libro que estaba buscando, pero es muy caro...",
    segunda: ["no", "tengo", "suficiente", "dinero", "para", "comprar"],
    verbo: "comprar",
    pronombre: "lo",
    sufijo: "",
    antecedente_highlight: "el libro",
    respuesta_completa: "No tengo suficiente dinero para comprarlo."
  },
  {
    antecedente: "La entrada al concierto sale veinte mil pesos anticipada.",
    segunda: ["Haceme", "caso,", "compra"],
    verbo: "compra",
    pronombre: "la",
    sufijo: " un día antes por lo menos.",
    antecedente_highlight: "entrada",
    respuesta_completa: "Haceme caso, comprala un día antes por lo menos."
  },
  {
    antecedente: "El Museo Nacional de Bellas Artes es enorme.",
    segunda: ["No", "se", "puede", "recorrer"],
    verbo: "recorrer",
    pronombre: "lo",
    sufijo: " todo en una sola noche.",
    antecedente_highlight: "Museo Nacional de Bellas Artes",
    respuesta_completa: "No se puede recorrerlo todo en una sola noche."
  }
];

let current = 0, score = 0, answered = false, placed = [], shuffled = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function highlightText(text, highlight) {
  const idx = text.indexOf(highlight);
  if (idx === -1) return text;
  return text.slice(0, idx) + '<strong>' + highlight + '</strong>' + text.slice(idx + highlight.length);
}

function render() {
  const f = frases[current];
  answered = false;
  placed = [];
  shuffled = shuffle(f.segunda);

  document.getElementById('progress').style.width = ((current / frases.length) * 100) + '%';
  document.getElementById('counter').textContent = `Frase ${current + 1} de ${frases.length}`;
  document.getElementById('antecedente').innerHTML = highlightText(f.antecedente, f.antecedente_highlight);
  document.getElementById('verb-base').textContent = f.verbo;
  document.getElementById('verb-suffix').textContent = f.sufijo;
  document.getElementById('pronoun-input').value = '';
  document.getElementById('pronoun-input').disabled = false;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  renderPool();
  renderSentence();
}

function renderPool() {
  const pool = document.getElementById('word-pool');
  pool.innerHTML = '';
  shuffled.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'word-btn' + (placed.includes(i) ? ' used' : '');
    btn.textContent = w;
    btn.onclick = () => placeWord(i);
    pool.appendChild(btn);
  });
}

function renderSentence() {
  const f = frases[current];
  const area = document.getElementById('sentence-area');
  area.innerHTML = '';

  placed.forEach((idx, pos) => {
    const span = document.createElement('button');
    span.className = 'placed-word';
    span.textContent = shuffled[idx];
    span.onclick = () => removeWord(pos);
    area.appendChild(span);
  });

  const verbPlaced = placed.some(idx => shuffled[idx].toLowerCase() === f.verbo.toLowerCase());
  if (!verbPlaced) {
    const verbSpan = document.createElement('span');
    verbSpan.className = 'verb-placeholder';
    verbSpan.textContent = f.verbo + '___';
    area.appendChild(verbSpan);
  }
}

function placeWord(idx) {
  if (answered || placed.includes(idx)) return;
  placed.push(idx);
  renderPool();
  renderSentence();
}

function removeWord(pos) {
  if (answered) return;
  placed.splice(pos, 1);
  renderPool();
  renderSentence();
}

function checkAnswer() {
  if (answered) return;
  const f = frases[current];

  const userOrder = placed.map(i => shuffled[i]).join(' ');
  const correctOrder = f.segunda.join(' ');
  const orderCorrect = userOrder.toLowerCase() === correctOrder.toLowerCase();

  const pronoun = document.getElementById('pronoun-input').value.trim().toLowerCase();
  const pronounOk = pronoun === f.pronombre.toLowerCase();

  answered = true;
  document.getElementById('pronoun-input').disabled = true;

  const fb = document.getElementById('feedback');
  if (orderCorrect && pronounOk) {
    score++;
    fb.className = 'feedback correct';
    fb.textContent = '✓ ¡Muy bien! La oración completa es: "' + f.respuesta_completa + '"';
  } else {
    fb.className = 'feedback incorrect';
    let msg = '✗ ';
    if (!orderCorrect) msg += `El orden correcto era: "${correctOrder}___". `;
    if (!pronounOk) msg += `El pronombre correcto es "${f.pronombre}" → ${f.verbo + f.pronombre}.`;
    fb.textContent = msg;
  }

  document.getElementById('next-btn').style.display = 'inline-block';
}

function nextQuestion() {
  current++;
  if (current >= frases.length) showFinal();
  else render();
}

function showFinal() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('final-screen').style.display = 'block';
  document.getElementById('final-score').textContent = score + ' / ' + frases.length;
  const pct = score / frases.length;
  document.getElementById('final-msg').textContent =
    pct === 1    ? '¡Perfecto! Dominás los pronombres de OD.' :
    pct >= 0.75  ? 'Muy bien, seguí practicando.' :
    pct >= 0.5   ? 'Bien, pero hay margen para mejorar.' :
                   'Te recomiendo repasar los pronombres de objeto directo.';
}

function restart() {
  current = 0; score = 0;
  document.getElementById('final-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  render();
}

render();
</script>
</body>
</html>
